name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build and publish, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
          - os: macos-13
            arch: x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    # Apple Silicon is the required artifact. The Intel (macos-13) runner is
    # being wound down by GitHub and has hung "awaiting a runner" before, so
    # make its failure non-blocking: the release still publishes on aarch64.
    continue-on-error: ${{ matrix.arch == 'x86_64' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: bun install

      - name: Bake version from tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          python3 -c "
          import json, sys
          with open('src-tauri/tauri.conf.json') as f:
              d = json.load(f)
          d['version'] = sys.argv[1]
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(d, f, indent=2)
          " "$VERSION"
          sed -i "" "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Build syscap sidecar
        run: bash scripts/build-syscap.sh

      - name: Build screenrec sidecar
        run: bash scripts/build-screenrec.sh

      - name: Build calmatch sidecar
        run: bash scripts/build-calmatch.sh

      - name: Build app bundle
        # Force ad-hoc signing for distribution. The committed tauri.conf.json
        # pins a local self-signed identity ("Echo Scribe Local Dev") so local
        # rebuilds keep their TCC grants; that cert doesn't exist on CI runners,
        # so override to ad-hoc here (env wins over config).
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: bun tauri build --bundles app

      - name: Stabilize sidecar signatures
        run: bash scripts/sign-macos-bundle.sh

      - name: Package
        run: |
          tar -czf "EchoScribe-${{ matrix.arch }}.tar.gz" \
            -C src-tauri/target/release/bundle/macos \
            "Echo Scribe.app"

      - name: Install + first-launch smoke test
        # Runs the real install.sh against the tarball we just built, then
        # launches the installed app with ECHO_SCRIBE_SMOKE=1 and requires it
        # to self-report a rendered frontend + packaged sidecars. A failure
        # here blocks the release from publishing.
        run: bash scripts/smoke-test.sh "EchoScribe-${{ matrix.arch }}.tar.gz"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: EchoScribe-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: EchoScribe-*.tar.gz

      - name: Verify published assets
        run: |
          # aarch64 is required — fail the release if it's missing.
          curl --fail --location --retry 5 --retry-all-errors --silent --show-error --head \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/EchoScribe-aarch64.tar.gz"
          # x86_64 is best-effort (Intel runner may have been skipped) — warn only.
          if ! curl --fail --location --retry 5 --retry-all-errors --silent --show-error --head \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/EchoScribe-x86_64.tar.gz"; then
            echo "::warning::EchoScribe-x86_64.tar.gz was not published (Intel build failed or was skipped)."
          fi
