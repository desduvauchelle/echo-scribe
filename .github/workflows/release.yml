name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
          - os: macos-13
            arch: x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: bun install

      - name: Bake version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json, sys
          with open('src-tauri/tauri.conf.json') as f:
              d = json.load(f)
          d['version'] = sys.argv[1]
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(d, f, indent=2)
          " "$VERSION"
          sed -i "" "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Build syscap sidecar
        run: bash scripts/build-syscap.sh

      - name: Build screenrec sidecar
        run: bash scripts/build-screenrec.sh

      - name: Build calmatch sidecar
        run: bash scripts/build-calmatch.sh

      - name: Build app bundle
        run: bun tauri build --bundles app

      - name: Package
        run: |
          tar -czf "EchoScribe-${{ matrix.arch }}.tar.gz" \
            -C src-tauri/target/release/bundle/macos \
            "Echo Scribe.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "EchoScribe-${{ matrix.arch }}.tar.gz"
