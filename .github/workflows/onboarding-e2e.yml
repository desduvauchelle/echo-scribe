name: Onboarding e2e

# First-run onboarding flow tested against the real built frontend with the
# Tauri IPC layer mocked (e2e/). Fast Ubuntu job so onboarding regressions
# surface on every PR — the full install + native first-launch smoke test
# runs on macOS at release time (see release.yml).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run onboarding e2e tests
        run: bunx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
