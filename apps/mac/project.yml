name: EchoScribe
options:
  bundleIdPrefix: com.echoscribe
  deploymentTarget:
    macOS: "14.4"
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"

targets:
  EchoScribe:
    type: application
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: EchoScribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echoscribe.app
        INFOPLIST_FILE: EchoScribe/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: EchoScribe/Resources/EchoScribe.entitlements
        SWIFT_VERSION: "5.10"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        ENABLE_APP_SANDBOX: NO
