name: EchoScribe
options:
  bundleIdPrefix: com.echoscribe
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: "2.30.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

schemes:
  EchoScribe:
    build:
      targets:
        EchoScribe: all
        EchoScribeTests: [test]
        EchoScribeUITests: [test]
    test:
      targets:
        - EchoScribeTests
        - EchoScribeUITests

targets:
  EchoScribe:
    type: application
    platform: macOS
    sources:
      - path: EchoScribe
        excludes:
          - Resources/Info.plist
    info:
      path: EchoScribe/Resources/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        NSMicrophoneUsageDescription: Echo Scribe needs access to your microphone to record voice notes.
        NSSpeechRecognitionUsageDescription: Echo Scribe uses speech recognition to transcribe your voice notes into text.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echoscribe.app
        PRODUCT_NAME: Echo Scribe
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: EchoScribe/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: WhisperKit
      - package: KeyboardShortcuts
      - package: Sparkle
    entitlements:
      path: EchoScribe/Resources/EchoScribe.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true

  EchoScribeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EchoScribeTests
    dependencies:
      - target: EchoScribe
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Echo Scribe.app/Contents/MacOS/Echo Scribe"
        BUNDLE_LOADER: "$(TEST_HOST)"

  EchoScribeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: EchoScribeUITests
    dependencies:
      - target: EchoScribe
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
